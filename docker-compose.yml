version: "3.9"

services:

  # ── Node App ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime          # build only up to the runtime stage
    container_name: url-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      BASE_URL: http://localhost:3000

      # Postgres — use service name as host (Docker internal DNS)
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_DATABASE: urlshortener

      # Redis — same pattern
      REDIS_HOST: redis
      REDIS_PORT: 6379

      CACHE_TTL: 3600
      RATE_LIMIT_WINDOW: 60000
      RATE_LIMIT_MAX: 10
    depends_on:
      postgres:
        condition: service_healthy   # wait for the healthcheck to pass
      redis:
        condition: service_healthy
    networks:
      - internal

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: url-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: urlshortener
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Auto-run schema.sql on first startup
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d urlshortener"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal
    # Don't expose port 5432 to the host in production — only for local dev
    ports:
      - "5432:5432"

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: url-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal
    ports:
      - "6379:6379"

volumes:
  pg_data:
  redis_data:

networks:
  internal:
    driver: bridge