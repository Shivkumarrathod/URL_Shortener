version: "3.9"

services:
  app:
    build:
      target: build  # Use build stage which has dev dependencies (including nodemon)
    # Mount source code so changes reflect without rebuilding
    volumes:
      - ./src:/app/src
      - ./server.js:/app/server.js
      - /app/node_modules  # Don't override container's node_modules
    # Override CMD to use nodemon for hot reload
    command: ["node_modules/.bin/nodemon", "server.js"]
    environment:
      NODE_ENV: development
